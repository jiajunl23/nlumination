<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" role="img" aria-label="NLumination — natural-language color grading">
  <defs>
    <linearGradient id="nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="55%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <radialGradient id="blobOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobMagenta" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <linearGradient id="bgFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#111114"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="420" fill="url(#bgFade)"/>

  <g filter="url(#soft)" opacity="0.9">
    <ellipse cx="280" cy="180" rx="340" ry="240" fill="url(#blobOrange)"/>
    <ellipse cx="980" cy="280" rx="380" ry="240" fill="url(#blobMagenta)"/>
    <ellipse cx="1080" cy="80" rx="260" ry="180" fill="url(#blobCyan)"/>
  </g>

  <g transform="translate(640 200)" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, ui-sans-serif, sans-serif">
    <text font-size="118" font-weight="600" letter-spacing="-3" fill="url(#nGrad)">NLumination</text>
    <text y="72" font-size="22" font-weight="400" fill="#a1a1aa" letter-spacing="0.5">
      Tell your photos how to <tspan fill="#fb923c" font-style="italic">feel.</tspan>
    </text>
    <g transform="translate(0 120)">
      <rect x="-220" y="-18" width="440" height="36" rx="18" fill="#17171c" stroke="#2a2a32"/>
      <circle cx="-196" cy="0" r="3" fill="#f97316"/>
      <text x="-180" y="5" font-size="14" fill="#a1a1aa" text-anchor="start" font-family="ui-monospace, 'SF Mono', Menlo, monospace">moody, blue shadows, protect highlights</text>
    </g>
  </g>
</svg>
